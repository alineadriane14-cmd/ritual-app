<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>RITUAL</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a1a;color:#ccc;font-family:'Courier New',monospace;min-height:100vh}
.page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#222;border:1px solid #333;border-radius:16px;padding:28px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:20px}
.main-page{max-width:480px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.section{background:#222;border:1px solid #2a2a2a;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:12px}
.lbl{font-size:9px;letter-spacing:3px;color:#555;text-transform:uppercase}
.meta{font-size:10px;color:#555}
.field{display:flex;flex-direction:column;gap:8px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.row-sb{display:flex;justify-content:space-between;align-items:flex-start}
input[type=text],input[type=number]{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:10px 14px;color:#e8ff47;font-size:16px;font-family:'Courier New',monospace;outline:none;width:100%}
input.sm{font-size:13px;padding:7px 10px}
.btn{border-radius:8px;padding:9px 14px;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:'Courier New',monospace;border:1px solid}
.btn-primary{background:#e8ff47;color:#111;border:none;padding:14px;font-size:13px;letter-spacing:3px;width:100%;cursor:pointer;font-family:'Courier New',monospace;border-radius:8px}
.btn-green{background:#47ff8a22;border-color:#47ff8a;color:#47ff8a}
.btn-yellow{background:#e8ff4722;border-color:#e8ff47;color:#e8ff47}
.btn-blue{background:#47c8ff22;border-color:#47c8ff;color:#47c8ff}
.btn-red{background:#ff474722;border-color:#ff4747;color:#ff4747}
.btn-urgent{background:#ff8a4722;border-color:#ff8a47;color:#ff8a47;padding:5px 9px;border-radius:6px;cursor:pointer;font-family:'Courier New',monospace;border:1px solid #ff8a47;font-weight:700}
.btn-sm{background:#2a2a1a;border:1px solid #e8ff4744;border-radius:6px;padding:6px 10px;color:#e8ff47;font-size:10px;font-weight:700;cursor:pointer;font-family:'Courier New',monospace}
.btn-x{background:transparent;border:1px solid #333;border-radius:6px;padding:4px 8px;color:#555;font-size:11px;cursor:pointer;font-family:'Courier New',monospace}
.btn-dashed{background:transparent;border:1px dashed #333;border-radius:8px;padding:10px;color:#555;font-size:11px;letter-spacing:2px;cursor:pointer;font-family:'Courier New',monospace;width:100%}
.btn-log{background:transparent;border:1px solid #2a2a2a;border-radius:6px;padding:5px 10px;color:#555;font-size:10px;letter-spacing:2px;cursor:pointer;font-family:'Courier New',monospace}
.debit-num{font-size:36px;font-weight:700;color:#e8ff47;letter-spacing:2px}
.rest-badge{background:#47c8ff22;border:1px solid #47c8ff44;border-radius:6px;padding:5px 10px;font-size:12px;color:#47c8ff;cursor:pointer}
.timer-circle{width:150px;height:150px;border-radius:50%;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;align-self:center}
.timer-time{font-size:34px;font-weight:700;letter-spacing:2px}
.timer-lbl{font-size:9px;letter-spacing:3px;color:#555;margin-top:2px}
.task-card{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;margin-bottom:6px}
.task-card.active{border-color:#e8ff47;background:#1e1e14}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{background:#222;border:1px solid #333;border-radius:20px;padding:4px 10px;color:#ccc;font-size:11px;cursor:pointer;font-family:'Courier New',monospace}
.notif{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:1px;z-index:1000;white-space:nowrap;color:#111;font-family:'Courier New',monospace;display:none}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="notif" id="notif"></div>

<!-- SETUP -->
<div class="page" id="screen-setup">
  <div class="card">
    <div style="text-align:center">
      <span style="font-size:44px;color:#e8ff47;display:block">◈</span>
      <div style="font-size:30px;font-weight:700;color:#e8ff47;letter-spacing:12px">RITUAL</div>
      <div style="font-size:10px;color:#555;letter-spacing:3px;margin-top:4px">sistema de débito numérico</div>
    </div>
    <div class="field">
      <label class="lbl">DÉBITO INICIAL</label>
      <input type="number" id="debit-input" placeholder="ex: 23450">
    </div>
    <div class="field">
      <label class="lbl">TAREFAS</label>
      <div class="row" id="sugg-actions" style="display:none">
        <button class="btn-sm" id="btn-last-list">↩ ÚLTIMA LISTA</button>
        <button class="btn-sm" id="btn-toggle-sugg">★ SUGESTÕES ▼</button>
      </div>
      <div class="hidden" id="sugg-panel" style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:10px">
        <div class="lbl" style="margin-bottom:8px">TOQUE PARA ADICIONAR</div>
        <div class="chips" id="sugg-chips"></div>
      </div>
      <div id="setup-tasks"></div>
      <button class="btn-dashed" id="btn-add-setup-task">+ ADICIONAR TAREFA</button>
    </div>
    <button class="btn-primary" id="btn-start">INICIAR RITUAL ◈</button>
  </div>
</div>

<!-- MAIN -->
<div class="main-page hidden" id="screen-main">
  <div class="section">
    <div class="row-sb">
      <div>
        <div class="lbl">DÉBITO ATUAL</div>
        <div class="debit-num" id="debit-display">0</div>
        <div class="meta" id="debit-meta"></div>
        <div class="meta" id="debit-base"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
        <div class="rest-badge" id="rest-badge">😴 0min</div>
        <button class="btn-log" id="btn-log">LOG</button>
      </div>
    </div>
    <button id="btn-reset" style="background:transparent;border:1px solid #ff474766;border-radius:6px;padding:6px 12px;color:#ff4747;font-size:10px;letter-spacing:2px;cursor:pointer;font-family:'Courier New',monospace;width:100%">↺ REINICIAR TUDO</button>
    <div>
      <div class="lbl">ADICIONAR DÉBITO</div>
      <div class="row">
        <input type="number" id="extra-input" class="sm" placeholder="ex: 500" style="flex:1">
        <button class="btn btn-yellow" id="btn-extra">+ DÉBITO</button>
      </div>
      <div id="extra-log" style="margin-top:6px"></div>
    </div>
  </div>

  <div class="section" style="align-items:center">
    <div class="timer-circle" id="timer-circle" style="border-color:#555">
      <div class="timer-time" id="timer-display" style="color:#555">25:00</div>
      <div class="timer-lbl" id="timer-lbl">AGUARDANDO</div>
    </div>
    <div class="row" id="timer-controls"></div>
    <div id="urgent-info" class="hidden" style="font-size:11px;color:#ff8a47">⚡ MODO URGENTE — pontos serão guardados</div>
    <div id="paused-info" class="hidden" style="font-size:11px;color:#47c8ff"></div>
  </div>

  <div class="section hidden" id="current-task-section" style="border-color:#e8ff4744">
    <div class="lbl">TAREFA ATUAL</div>
    <div id="current-task-name" style="font-size:20px;color:#e8ff47;font-weight:700"></div>
    <div id="current-task-faixa" class="meta"></div>
  </div>

  <div class="field">
    <div class="lbl" id="tasks-count">TAREFAS</div>
    <div id="task-list"></div>
    <div id="add-task-area" class="field" style="margin-top:4px">
      <div class="row">
        <input type="text" id="new-task-input" class="sm" placeholder="Nova tarefa..." style="flex:1">
        <button class="btn btn-green" id="btn-add-task">+ TAREFA</button>
      </div>
      <div class="chips" id="task-sugg-chips"></div>
    </div>
  </div>

  <div class="section hidden" id="log-section">
    <div class="lbl">LOG DE OPERAÇÕES</div>
    <div id="log-list" style="max-height:200px;overflow-y:auto"></div>
  </div>
</div>

<script>
// ─── NÚCLEO ──────────────────────────────────────────────────────────────────
function getABC(n){const l=Math.abs(n)%1000;return{a:Math.floor(l/100),b:Math.floor((l%100)/10),c:l%10}}
function calcD(n){return Math.floor(Math.abs(n)/990)}
function getFirstGroup(n){const s=Math.abs(n).toString();if(s.length<=3)return Math.abs(n);let t=s;while(t.length>3)t=t.slice(0,-3);return parseInt(t,10)}
function applySeconds(debit,d,seconds){
  let val=debit,dVal=d,log=[];
  let mins=Math.floor(seconds/60);
  const extra9=Math.floor((seconds%60)/6)*9;
  let maxIter=mins*20+100;
  while(mins>0&&maxIter-->0){
    const{a,b,c}=getABC(val);const bc=b*10+c;
    if(a===0&&dVal===0){log.push({type:"PAGO",from:val,to:val});break}
    if(a===0&&dVal>0){
      if(bc>0&&bc%9===0){log.push({type:"+1620",reason:"a=0+bc",from:val,to:val+1620});val+=1620;dVal--;mins--}
      else{log.push({type:"+810",reason:"a=0",from:val,to:val+810});val+=810;dVal--;mins--}
    }else if(bc>0&&bc%9===0&&a!==0){log.push({type:"+810",reason:"bc="+bc,from:val,to:val+810});val+=810;mins--}
    else{log.push({type:"-90",from:val,to:val-90});val-=90;mins--}
  }
  if(extra9>0){log.push({type:"-"+extra9,reason:"parcial",from:val,to:val-extra9});val-=extra9}
  return{value:val,d:dVal,log}
}
function getFaixas(list){
  const p=list.filter(t=>!t.done);if(!p.length)return[];
  const sz=Math.floor(999/p.length);
  return p.map((t,i)=>({...t,faixaMin:i*sz,faixaMax:i===p.length-1?999:(i+1)*sz-1}))
}
function simulateMins(debit,d,faixaMax){
  let val=debit,dVal=d,mins=0,max=10000;
  while(max-->0){
    if(getFirstGroup(val)>faixaMax)break;
    const{a,b,c}=getABC(val);const bc=b*10+c;
    if(a===0&&dVal===0)break;
    if(a===0&&dVal>0){if(bc>0&&bc%9===0){val+=1620;dVal--}else{val+=810;dVal--}}
    else if(bc>0&&bc%9===0&&a!==0){val+=810}
    else{val-=90}
    mins++
  }
  return mins
}

// ─── ESTADO ──────────────────────────────────────────────────────────────────
const WORK=1500,SHORT=300,LONG=600;
let S={
  screen:"setup",debit:0,dVal:0,initialDebit:0,
  taskList:[],currentId:null,pausedId:null,
  pausedTimerRemaining:null,pausedWorkedSecs:0,
  urgentMode:false,urgentSecs:{},
  timerSecs:WORK,timerMode:"idle",
  breakPaused:false,restAccum:0,
  extraLog:[],debitLog:[],
  setupTasks:[""],taskHistory:[],suggestions:[]
};
let intervalId=null,startTs=null,remainingSecs=WORK,workedBefore=0,breakSecs=0;

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function save(){try{localStorage.setItem("ritual",JSON.stringify(S))}catch(e){}}
function load(){try{const d=localStorage.getItem("ritual");if(d)S={...S,...JSON.parse(d)}}catch(e){}}

// ─── TIMER ───────────────────────────────────────────────────────────────────
function fmt(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")}
function getWorked(){return startTs?workedBefore+Math.floor((Date.now()-startTs)/1000):workedBefore}
function stopTimer(){clearInterval(intervalId);intervalId=null}
function startTimerFrom(rem,mode){
  stopTimer();remainingSecs=rem;workedBefore=0;breakSecs=0;startTs=Date.now();
  S.timerMode=mode;S.timerSecs=rem;
  runInterval(rem,mode,Date.now(),0);
  renderTimer()
}
function runInterval(snapRem,snapMode,snapTs,snapWorked){
  clearInterval(intervalId);
  intervalId=setInterval(function(){
    const el=Math.floor((Date.now()-snapTs)/1000);
    const rem=Math.max(0,snapRem-el);
    if(snapMode==="short_break"||snapMode==="rest_saved")breakSecs=el;
    S.timerSecs=rem;
    document.getElementById("timer-display").textContent=fmt(rem);
    if(rem<=0){clearInterval(intervalId);onTimerEnd(snapMode,snapWorked+(snapMode==="work"?el:0))}
  },500)
}
function onTimerEnd(mode,worked){
  if(mode==="work"){
    if(worked>0)applyNow(worked);
    workedBefore=0;startTs=null;
    notify("Pomodoro finalizado! 5 min de descanso 🍃","info");
    startTimerFrom(SHORT,"short_break");
  }else{
    if(breakSecs>0)applyNow(breakSecs);
    breakSecs=0;S.breakPaused=false;
    notify("Descanso finalizado! 💪","success");
    S.timerMode="idle";S.timerSecs=WORK;remainingSecs=WORK;
    render()
  }
  save()
}
function applyNow(secs){
  if(secs<=0)return;
  const r=applySeconds(S.debit,S.dVal,secs);
  S.debit=r.value;S.dVal=r.d;
  S.debitLog=[...(S.debitLog||[]),...r.log].slice(-100);
  checkUrgent(r.value,r.d);
  renderDebit();renderLog();save()
}
function checkUrgent(nb,nd){
  const fg=getFirstGroup(nb);
  Object.entries(S.urgentSecs||{}).forEach(function([id,secs]){
    if(!secs||secs<=0)return;
    id=parseInt(id);
    const faixas=getFaixas(S.taskList);
    const f=faixas.find(function(f){return f.id===id});
    if(f&&fg>=f.faixaMin&&fg<=f.faixaMax){
      const name=S.taskList.find(function(t){return t.id===id})?.name||"Tarefa "+id;
      notify("⚡ Aplicando tempo de \""+name+"\"!","success");
      const r2=applySeconds(nb,nd,secs);
      S.debit=r2.value;S.dVal=r2.d;
      S.debitLog=[...(S.debitLog||[]),...r2.log].slice(-100);
      S.taskList=S.taskList.map(function(t){return t.id===id?{...t,done:true,waitingApply:false}:t});
      delete S.urgentSecs[id];
      save();render()
    }
  })
}
function handleFaixaChange(nb,ntl){
  if(S.currentId===null)return false;
  const faixas=getFaixas(ntl);if(!faixas.length)return false;
  const fg=getFirstGroup(nb);
  const correct=faixas.find(function(f){return fg>=f.faixaMin&&fg<=f.faixaMax})||faixas[0];
  if(!correct||correct.id===S.currentId)return false;
  const worked=getWorked();stopTimer();
  if(worked>0)S.urgentSecs={...S.urgentSecs,[S.currentId]:(S.urgentSecs[S.currentId]||0)+worked};
  workedBefore=0;startTs=null;remainingSecs=WORK;
  S.currentId=correct.id;S.timerMode="idle";S.timerSecs=WORK;
  notify("⚠ Faixa mudou → \""+correct.name+"\". Tempo guardado.","error");
  return true
}

// ─── AÇÕES ───────────────────────────────────────────────────────────────────
function startApp(){
  const d=parseInt(document.getElementById("debit-input").value,10);
  if(isNaN(d)||d<=0)return notify("Débito inválido!","error");
  const inputs=document.querySelectorAll(".setup-task-input");
  const valid=Array.from(inputs).map(function(i){return i.value.trim()}).filter(Boolean);
  if(!valid.length)return notify("Adicione pelo menos 1 tarefa!","error");
  // Se o débito não mudou (nova lista), preserva dVal e initialDebit atuais
  const isNewList = d === S.debit && S.initialDebit > 0;
  S.debit=d;
  if(!isNewList){ S.dVal=calcD(d); S.initialDebit=d; }
  S.taskList=valid.map(function(name,i){return{id:i,name:name,done:false}});
  S.currentId=null;S.pausedId=null;S.urgentMode=false;S.urgentSecs={};
  S.timerMode="idle";S.timerSecs=WORK;S.breakPaused=false;
  if(!isNewList){S.restAccum=0;S.extraLog=[];S.debitLog=[];}
  workedBefore=0;breakSecs=0;startTs=null;remainingSecs=WORK;
  S.taskHistory=[...(S.taskHistory||[]),valid];
  S.suggestions=computeSugg(S.taskHistory);
  S.screen="main";save();showMain();render()
}
function addExtraDebit(){
  const extra=parseInt(document.getElementById("extra-input").value,10);
  if(isNaN(extra)||extra<=0)return notify("Valor inválido!","error");
  const ni=S.initialDebit+extra,nb=S.debit+extra;
  const dd=calcD(ni)-calcD(S.initialDebit);
  const nd=S.dVal+Math.max(0,dd);
  S.initialDebit=ni;S.debit=nb;S.dVal=nd;
  S.extraLog=[...(S.extraLog||[]),{value:extra,newInitial:ni,newD:nd,dDiff:dd}];
  document.getElementById("extra-input").value="";
  const changed=handleFaixaChange(nb,S.taskList);
  if(!changed)notify("+"+extra.toLocaleString("pt-BR")+" adicionado! d+"+dd+"="+nd,"success");
  save();render()
}
function addTask(){
  const input=document.getElementById("new-task-input");
  const name=input.value.trim();
  if(!name)return notify("Digite o nome da tarefa!","error");
  const newId=S.taskList.length?Math.max(...S.taskList.map(function(t){return t.id}))+1:0;
  const nl=[...S.taskList,{id:newId,name:name,done:false}];
  S.taskList=nl;input.value="";
  const changed=handleFaixaChange(S.debit,nl);
  if(!changed)notify("✅ \""+name+"\" adicionada!","success");
  save();renderTasks()
}
function startTask(id,urgent){
  id=parseInt(id);urgent=!!urgent;
  if(urgent&&S.currentId!==null){
    S.pausedId=S.currentId;
    S.pausedTimerRemaining=remainingSecs;
    S.pausedWorkedSecs=getWorked()
  }
  S.currentId=id;S.urgentMode=urgent;
  workedBefore=0;startTs=null;remainingSecs=WORK;
  const faixas=getFaixas(S.taskList);
  const task=faixas.find(function(f){return f.id===id});
  const lm=task?simulateMins(S.debit,S.dVal,task.faixaMax):null;
  const wt=lm!==null&&lm<25?lm*60:WORK;
  startTimerFrom(wt,"work");
  notify(urgent?"⚡ Urgente iniciada!":"▶ Pomodoro iniciado!","success");
  save();render()
}
function pauseTask(){
  workedBefore=getWorked();remainingSecs=S.timerSecs;stopTimer();
  notify("⏸ Pausado.","info");save();renderTimer()
}
function resumeTask(){
  startTs=Date.now();
  runInterval(remainingSecs,"work",Date.now(),workedBefore);
  notify("▶ Retomado!","success");renderTimer()
}
function completeTask(id){
  id=parseInt(id);const worked=getWorked();stopTimer();
  if(S.urgentMode){
    if(worked>0)S.urgentSecs={...S.urgentSecs,[id]:(S.urgentSecs[id]||0)+worked};
    S.taskList=S.taskList.map(function(t){return t.id===id?{...t,waitingApply:true}:t});
    S.restAccum=(S.restAccum||0)+LONG;S.urgentMode=false;
    S.timerMode="idle";S.timerSecs=WORK;remainingSecs=WORK;
    if(S.pausedId!==null){
      const rr=S.pausedTimerRemaining||WORK,rw=S.pausedWorkedSecs||0;
      S.currentId=S.pausedId;workedBefore=rw;remainingSecs=rr;startTs=null;
      S.timerSecs=rr;S.timerMode="work";
      S.pausedId=null;S.pausedTimerRemaining=null;S.pausedWorkedSecs=0;
      notify("⚡ Urgente concluída! "+Math.floor(rr/60)+"min restantes — RETOMAR","success")
    }else{S.currentId=null;notify("⚡ Urgente concluída! Pontos aplicados quando faixa chegar.","success")}
  }else{
    if(worked>0)applyNow(worked);
    const saved=S.urgentSecs[id]||0;
    if(saved>0){applyNow(saved);delete S.urgentSecs[id]}
    S.taskList=S.taskList.map(function(t){return t.id===id?{...t,done:true}:t});
    S.restAccum=(S.restAccum||0)+LONG;S.currentId=null;S.urgentMode=false;
    S.timerMode="idle";S.timerSecs=WORK;remainingSecs=WORK;
    notify("✅ Concluída! +10min de descanso.","success")
  }
  workedBefore=0;startTs=null;save();render()
}
function useRestNow(){
  if(!S.restAccum||S.restAccum<=0)return notify("Nenhum descanso acumulado!","error");
  S.restAccum-=LONG;startTimerFrom(LONG,"rest_saved");
  notify("😴 Descanso de 10 min iniciado!","info");save();renderTimer()
}
function pauseBreak(){
  if(breakSecs>0)applyNow(breakSecs);
  S.restAccum=(S.restAccum||0)+S.timerSecs;breakSecs=0;stopTimer();
  S.breakPaused=true;S.timerMode="idle";S.timerSecs=WORK;remainingSecs=WORK;
  notify("⏸ Descanso pausado! Saldo guardado.","info");save();renderTimer()
}
function confirmReset(){
  if(confirm("⚠ Reiniciar tudo?\nDébito, tarefas e progresso serão apagados.\n(Histórico de sugestões mantido)")){
    stopTimer();
    const h=S.taskHistory||[],sg=S.suggestions||[];
    S={screen:"setup",debit:0,dVal:0,initialDebit:0,taskList:[],currentId:null,pausedId:null,
      pausedTimerRemaining:null,pausedWorkedSecs:0,urgentMode:false,urgentSecs:{},
      timerSecs:WORK,timerMode:"idle",breakPaused:false,restAccum:0,
      extraLog:[],debitLog:[],setupTasks:[""],taskHistory:h,suggestions:sg};
    workedBefore=0;breakSecs=0;startTs=null;remainingSecs=WORK;
    save();showSetup();renderSetup();
    notify("↺ Reiniciado!","info")
  }
}
function computeSugg(h){
  const f={};
  (h||[]).forEach(function(list){list.forEach(function(t){if(t)f[t]=(f[t]||0)+1})});
  return Object.entries(f).sort(function(a,b){return b[1]-a[1]}).slice(0,20).map(function(e){return{name:e[0],count:e[1]}})
}

// ─── NOTIF ───────────────────────────────────────────────────────────────────
let notifT;
function notify(msg,type){
  const el=document.getElementById("notif");
  el.textContent=msg;
  el.style.background=type==="error"?"#ff4747":type==="success"?"#47ff8a":"#47c8ff";
  el.style.display="block";clearTimeout(notifT);
  notifT=setTimeout(function(){el.style.display="none"},3500)
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function showMain(){S.screen="main";document.getElementById("screen-setup").classList.add("hidden");document.getElementById("screen-main").classList.remove("hidden")}
function showSetup(){S.screen="setup";document.getElementById("screen-main").classList.add("hidden");document.getElementById("screen-setup").classList.remove("hidden")}
function render(){renderDebit();renderTimer();renderTasks();renderLog();renderCurrentTask()}

function renderDebit(){
  const{a,b,c}=getABC(S.debit);
  document.getElementById("debit-display").textContent=S.debit.toLocaleString("pt-BR");
  document.getElementById("debit-meta").textContent="d="+S.dVal+" | grupo="+getFirstGroup(S.debit)+" | a="+a+" b="+b+" c="+c;
  document.getElementById("debit-base").textContent="base="+S.initialDebit.toLocaleString("pt-BR");
  document.getElementById("rest-badge").textContent="😴 "+Math.floor((S.restAccum||0)/60)+"min";
  document.getElementById("extra-log").innerHTML=(S.extraLog||[]).map(function(e){return'<div class="meta">+'+e.value.toLocaleString("pt-BR")+" → base="+e.newInitial.toLocaleString("pt-BR")+" d="+e.newD+"</div>"}).join("")
}
function renderTimer(){
  const m=S.timerMode;
  const color=m==="work"?"#e8ff47":m==="short_break"?"#47ffc8":m==="rest_saved"?"#47c8ff":"#555";
  const lbl=m==="work"?"FOCO":m==="short_break"?"PAUSA CURTA":m==="rest_saved"?"DESCANSO":"AGUARDANDO";
  document.getElementById("timer-circle").style.borderColor=color;
  document.getElementById("timer-display").style.color=color;
  document.getElementById("timer-display").textContent=fmt(S.timerSecs);
  document.getElementById("timer-lbl").textContent=lbl;
  const faixas=getFaixas(S.taskList);
  const fg=getFirstGroup(S.debit);
  const ct=faixas.find(function(f){return fg>=f.faixaMin&&fg<=f.faixaMax})||faixas[0];
  let h="";
  if(m==="idle"&&ct&&!S.breakPaused)h+='<button class="btn btn-green" onclick="startTask('+ct.id+',false)">▶ INICIAR</button>';
  if(m==="work"&&intervalId)h+='<button class="btn btn-yellow" onclick="pauseTask()">⏸ PAUSAR</button><button class="btn btn-green" onclick="completeTask('+S.currentId+')">✓ CONCLUIR</button>';
  if(m==="work"&&!intervalId&&S.currentId!==null)h+='<button class="btn btn-green" onclick="resumeTask()">▶ RETOMAR</button><button class="btn btn-green" onclick="completeTask('+S.currentId+')">✓ CONCLUIR</button>';
  if((m==="short_break"||m==="rest_saved")&&intervalId)h+='<button class="btn btn-yellow" onclick="pauseBreak()">⏸ PAUSAR DESCANSO</button>';
  if(S.breakPaused){
    h+='<button class="btn btn-blue" onclick="S.breakPaused=false;useRestNow()">▶ CONTINUAR</button>';
    if(S.currentId!==null)h+='<button class="btn btn-green" onclick="S.breakPaused=false;completeTask('+S.currentId+')">✓ CONCLUIR TAREFA</button>';
    h+='<button class="btn btn-yellow" onclick="S.breakPaused=false;renderTimer()">💾 GUARDAR</button>'
  }
  if(m==="idle"&&!S.breakPaused&&S.restAccum>0&&!S.currentId)h+='<button class="btn btn-blue" onclick="useRestNow()">😴 DESCANSAR ('+Math.floor(S.restAccum/60)+'min)</button>';
  document.getElementById("timer-controls").innerHTML=h;
  document.getElementById("urgent-info").classList.toggle("hidden",!S.urgentMode);
  const pi=document.getElementById("paused-info");
  if(S.pausedId!==null){const pn=S.taskList.find(function(t){return t.id===S.pausedId})?.name||"";pi.textContent="⏸ Pausada: "+pn;pi.classList.remove("hidden")}
  else pi.classList.add("hidden")
}
function renderCurrentTask(){
  const faixas=getFaixas(S.taskList);
  const fg=getFirstGroup(S.debit);
  const ct=faixas.find(function(f){return fg>=f.faixaMin&&fg<=f.faixaMax})||faixas[0];
  const sec=document.getElementById("current-task-section");
  if(ct){sec.classList.remove("hidden");document.getElementById("current-task-name").textContent=ct.name;document.getElementById("current-task-faixa").textContent="Faixa: "+ct.faixaMin+"–"+ct.faixaMax+" | Grupo: "+fg}
  else sec.classList.add("hidden")
}
function renderTasks(){
  const faixas=getFaixas(S.taskList);
  const done=S.taskList.filter(function(t){return t.done}).length;
  document.getElementById("tasks-count").textContent="TAREFAS ("+done+"/"+S.taskList.length+")";
  const allDone=S.taskList.length>0&&S.taskList.every(function(t){return t.done});
  const listEl=document.getElementById("task-list");
  const addArea=document.getElementById("add-task-area");
  if(allDone){
    listEl.innerHTML='<div class="section" style="border-color:#47ff8a;text-align:center"><div style="color:#47ff8a;font-weight:700;margin-bottom:12px">🎉 TODAS CONCLUÍDAS!</div><button class="btn-primary" onclick="newList()">NOVA LISTA</button></div>';
    addArea.classList.add("hidden")
  }else{
    addArea.classList.remove("hidden");
    listEl.innerHTML=faixas.map(function(f){
      const isCur=S.currentId===f.id;
      const saved=S.urgentSecs?.[f.id]||0;
      return'<div class="task-card'+(isCur?" active":"")+'"><div class="row"><span style="font-size:18px;color:'+(isCur?"#e8ff47":"#444")+';width:24px;flex-shrink:0">'+f.id+'</span><div style="flex:1"><div style="font-size:13px;color:'+(isCur?"#e8ff47":"#bbb")+'">'+f.name+'</div><div class="meta">'+f.faixaMin+'–'+f.faixaMax+'</div>'+(saved>0?'<div style="font-size:9px;color:#47ffc8">💾 '+saved+'s guardados</div>':"")+(f.waitingApply?'<div style="font-size:9px;color:#ff8a47">⏳ aguardando faixa</div>':"")+'</div>'+(!isCur&&!f.done?'<button class="btn-urgent" onclick="startTask('+f.id+',true)">⚡</button>':"")+(isCur?'<span style="color:#e8ff47;font-size:18px">●</span>':"")+'</div></div>'
    }).join("");
    document.getElementById("task-sugg-chips").innerHTML=(S.suggestions||[]).slice(0,8).map(function(s){return'<button class="chip" onclick="document.getElementById(\'new-task-input\').value=\''+s.name.replace(/'/g,"\\'")+'\'">'+s.name+'</button>'}).join("")
  }
  renderCurrentTask()
}
function renderLog(){
  document.getElementById("log-list").innerHTML=(S.debitLog||[]).slice(-40).reverse().map(function(l){return'<div class="meta"><span style="color:'+(l.type.includes("+")?"#47ffc8":"#ff8a47")+'">'+l.type+'</span> '+l.from+'→'+l.to+(l.reason?" ("+l.reason+")":"")+'</div>'}).join("")
}
function renderSetup(){
  const ha=(S.taskHistory||[]).length>0;
  document.getElementById("sugg-actions").style.display=ha?"flex":"none";
  document.getElementById("sugg-chips").innerHTML=(S.suggestions||[]).map(function(s){return'<button class="chip" onclick="addSuggToSetup(\''+s.name.replace(/'/g,"\\'")+'\')">'+s.name+'<span style="font-size:9px;color:#e8ff47;background:#2a2a1a;border-radius:10px;padding:1px 4px;margin-left:4px">×'+s.count+'</span></button>'}).join("");
  if(!S.setupTasks||!S.setupTasks.length)S.setupTasks=[""];
  renderSetupTasks()
}
function renderSetupTasks(){
  document.getElementById("setup-tasks").innerHTML=(S.setupTasks||[""]).map(function(t,i){return'<div class="row" style="margin-bottom:5px"><span style="width:20px;font-size:11px;color:#e8ff47;flex-shrink:0">'+i+'</span><input type="text" class="sm setup-task-input" style="flex:1" placeholder="Tarefa '+i+'" value="'+t.replace(/"/g,"&quot;")+'" oninput="S.setupTasks['+i+']=this.value"><button class="btn-x" onclick="removeSetupTask('+i+')">✕</button></div>'}).join("")
}
function addSuggToSetup(name){
  const e=S.setupTasks.findIndex(function(t){return!t.trim()});
  if(e!==-1)S.setupTasks[e]=name;else S.setupTasks.push(name);
  renderSetupTasks()
}
function removeSetupTask(i){S.setupTasks=S.setupTasks.filter(function(_,j){return j!==i});renderSetupTasks()}
function addSetupTask(){S.setupTasks=[...(S.setupTasks||[]),""];renderSetupTasks()}
function applyLastList(){if(!(S.taskHistory||[]).length)return;S.setupTasks=[...S.taskHistory[S.taskHistory.length-1],""];renderSetupTasks()}
function toggleSugg(){const p=document.getElementById("sugg-panel");p.classList.toggle("hidden");document.getElementById("btn-toggle-sugg").textContent="★ SUGESTÕES "+(p.classList.contains("hidden")?"▼":"▲")}
function toggleLog(){document.getElementById("log-section").classList.toggle("hidden")}
function newList(){
  stopTimer();
  S.taskList=[];S.currentId=null;S.pausedId=null;S.urgentMode=false;S.urgentSecs={};
  S.timerMode="idle";S.timerSecs=WORK;S.breakPaused=false;
  S.setupTasks=[""];
  workedBefore=0;breakSecs=0;startTs=null;remainingSecs=WORK;
  // mantém: debit, dVal, initialDebit, restAccum, extraLog, debitLog, taskHistory, suggestions
  S.screen="setup";save();showSetup();renderSetup();
  notify("Nova lista! Débito mantido: "+S.debit.toLocaleString("pt-BR"),"info");
  // preenche débito no campo
  document.getElementById("debit-input").value=S.debit;
}

// ─── EVENTOS ─────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("btn-start").onclick=startApp;
  document.getElementById("btn-add-setup-task").onclick=addSetupTask;
  document.getElementById("btn-last-list").onclick=applyLastList;
  document.getElementById("btn-toggle-sugg").onclick=toggleSugg;
  document.getElementById("btn-extra").onclick=addExtraDebit;
  document.getElementById("extra-input").onkeydown=function(e){if(e.key==="Enter")addExtraDebit()};
  document.getElementById("btn-add-task").onclick=addTask;
  document.getElementById("new-task-input").onkeydown=function(e){if(e.key==="Enter")addTask()};
  document.getElementById("rest-badge").onclick=useRestNow;
  document.getElementById("btn-log").onclick=toggleLog;
  document.getElementById("btn-reset").onclick=confirmReset;
  load();
  if(S.screen==="main"){showMain();render()}else{renderSetup()}
});
</script>
</body>
</html>
